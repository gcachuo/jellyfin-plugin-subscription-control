version: '1.0.11.0'
targetAbi: '10.11.0.0'
framework: 'net9.0'
owner: 'EasyMovie'
overview: 'Subscription-based content access control with preroll videos'
description: >
  Controls media access based on user subscription status. Displays subscription-specific preroll videos before content and blocks playback for expired subscriptions. Integrates with EasyMovie subscription API to check user status (active, expiring, expired, courtesy, trial) and injects appropriate preroll videos or replacement content.

category: 'General'
